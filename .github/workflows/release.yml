name: Build and Release Plugin

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate distribution files
        shell: pwsh
        run: |
          if (!(Test-Path "AetherUI.zip")) {
            throw "AetherUI.zip is missing from repository root."
          }
          if (!(Test-Path "pluginmaster.json")) {
            throw "pluginmaster.json is missing from repository root."
          }
          Get-Content "pluginmaster.json" | ConvertFrom-Json | Out-Null

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: AetherUI.zip
          generate_release_notes: true
